<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS Battle Royale Simulator</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111;
        font-family: system-ui, sans-serif;
        color: #eee;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 1rem 0 0.5rem;
      }
      canvas {
        display: block;
        border: 1px solid #333;
        max-width: 100vw;
        max-height: calc(100vh - 4rem);
      }
      p.hint {
        font-size: 0.85rem;
        color: #888;
        margin: 0.5rem 1rem 1rem;
        text-align: center;
        max-width: 40rem;
      }
    </style>
  </head>
  <body>
    <h1>RPS Battle Royale Simulator</h1>
    <canvas id="arena" width="1000" height="1000"></canvas>
    <p class="hint">
      Query params:
      <code>?u=11&d=30&seed=123&n=0&bg=white&countdown=3&showstats</code>
    </p>
    <script type="module" src="./src/browser.js"></script>
  </body>
</html>
