<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS Battle Royale Simulator</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111;
        font-family: system-ui, sans-serif;
        color: #eee;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 1rem 0 0.5rem;
      }
      canvas {
        display: block;
        border: 1px solid #333;
        max-width: 100vw;
        max-height: calc(100vh - 4rem);
      }
      p.hint {
        font-size: 0.85rem;
        color: #888;
        margin: 0.5rem 1rem 1rem;
        text-align: center;
        max-width: 40rem;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.75);
        z-index: 100;
        padding: 1rem;
      }
      .overlay.hidden {
        display: none;
      }
      .overlay-card {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 12px;
        padding: 1.5rem 2rem;
        max-width: 28rem;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      .overlay-card h2 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
      }
      .overlay-card p {
        margin: 0 0 1.25rem;
        color: #aaa;
        font-size: 0.95rem;
      }
      .bet-buttons {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .bet-buttons button,
      .overlay-card .continue-btn {
        font: inherit;
        font-size: 1rem;
        font-weight: 600;
        padding: 0.65rem 1.25rem;
        border: 2px solid #555;
        border-radius: 8px;
        background: #2a2a2a;
        color: #eee;
        cursor: pointer;
        text-transform: capitalize;
      }
      .bet-buttons button:hover,
      .overlay-card .continue-btn:hover {
        background: #3a3a3a;
        border-color: #888;
      }
      .result-win {
        color: #6f6;
        font-size: 1.1rem;
        font-weight: 700;
        line-height: 1.5;
        margin-bottom: 1.25rem;
      }
      .result-lose {
        color: #f66;
        font-size: 1.1rem;
        font-weight: 700;
        line-height: 1.5;
        margin-bottom: 1.25rem;
      }
    </style>
  </head>
  <body>
    <div id="bet-overlay" class="overlay">
      <div class="overlay-card">
        <h2>Place your bet</h2>
        <p>Which kind will win the battle royale?</p>
        <div class="bet-buttons">
          <button type="button" data-bet="rock">Rock</button>
          <button type="button" data-bet="paper">Paper</button>
          <button type="button" data-bet="scissors">Scissors</button>
        </div>
      </div>
    </div>
    <div id="result-overlay" class="overlay hidden">
      <div class="overlay-card">
        <p id="result-message"></p>
        <button type="button" class="continue-btn" id="result-continue">
          Play again
        </button>
      </div>
    </div>
    <h1>RPS Battle Royale Simulator</h1>
    <canvas id="arena" width="1000" height="1000"></canvas>
    <p class="hint">
      Query params:
      <code>?u=11&d=30&seed=123&n=0&bg=lightgreen&countdown=3&showstats</code>
    </p>
    <script type="module" src="./src/browser.js"></script>
  </body>
</html>
